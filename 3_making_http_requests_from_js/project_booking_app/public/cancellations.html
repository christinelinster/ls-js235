<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cancellations</title>
  <script src="./javascripts/main.js"></script>
</head>
<body>
  <h1>Cancel Bookings</h1>
  <form id="cancel_booking" action="/api/bookings/:booking_id" method="post">
    <label for="booking_id">Booking ID:</label>
    <input type="number" id="booking_id" name="booking_id">

    <button type="submit">Submit</button>
  </form>
<h1>Cancel Schedules</h1>
  <form id="cancel_schedule" action="/api/schedules/:schedule_id" method="post">
    <label for="schedule_id">Schedule ID:</label>
    <input type="number" id="schedule_id" name="schedule_id">
    <button type="submit">Submit</button>
  </form>


</body>
</html>
